<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Papa Playlist</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #fff9c4 0%, #ffe0f0 50%, #d0f0ff 100%);
      font-family: 'Nunito', sans-serif;
      gap: 1.5rem;
      padding: 2rem;
      overflow-x: hidden;
    }

    h1 {
      font-family: 'Fredoka One', cursive;
      font-size: 2.8rem;
      color: #ff5c8a;
      text-align: center;
      letter-spacing: 0.03em;
      text-shadow: 3px 3px 0px #ffd6e8, 5px 5px 0px rgba(255,92,138,0.15);
      animation: bounce 1.5s infinite ease-in-out;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .stars {
      font-size: 1.4rem;
      text-align: center;
      animation: spin-stars 3s linear infinite;
      letter-spacing: 8px;
    }

    @keyframes spin-stars {
      0%   { letter-spacing: 8px; }
      50%  { letter-spacing: 16px; }
      100% { letter-spacing: 8px; }
    }

    .gif-container {
      border: 4px solid #ffb3d1;
      border-radius: 20px;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 8px 30px rgba(255, 92, 138, 0.2), 0 2px 8px rgba(0,0,0,0.08);
      transition: transform 0.3s ease;
    }

    .gif-container:hover {
      transform: scale(1.02) rotate(1deg);
    }

    .gif-container img {
      display: block;
      max-width: 380px;
      width: 100%;
    }

    .player {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      width: 100%;
      max-width: 380px;
    }

    #now-playing {
      font-size: 0.95rem;
      font-weight: 700;
      color: #b06aaa;
      text-align: center;
      min-height: 1.4em;
      background: rgba(255,255,255,0.7);
      padding: 6px 16px;
      border-radius: 20px;
      transition: all 0.3s;
    }

    .controls {
      display: flex;
      gap: 12px;
    }

    button {
      padding: 0.65rem 1.5rem;
      border: none;
      border-radius: 50px;
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 0 rgba(0,0,0,0.12);
    }

    button:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 rgba(0,0,0,0.12);
    }

    #btn-next {
      background: #ffcc00;
      color: #7a5a00;
    }

    #btn-next:hover { background: #f5c200; }

    #btn-gif {
      background: #5bc8ff;
      color: #00527a;
    }

    #btn-gif:hover { background: #3db8f5; }

    audio {
      width: 100%;
      margin-top: 0.25rem;
      border-radius: 12px;
    }

    .song-list {
      width: 100%;
      max-width: 380px;
      background: rgba(255,255,255,0.65);
      border-radius: 16px;
      padding: 1rem 1.25rem;
      border: 2px solid #ffd6e8;
    }

    .song-list h2 {
      font-family: 'Fredoka One', cursive;
      font-size: 1rem;
      color: #ff5c8a;
      margin-bottom: 0.6rem;
      letter-spacing: 0.04em;
    }

    .song-list ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .song-list li {
      font-size: 0.88rem;
      font-weight: 700;
      color: #aaa;
      padding: 5px 10px;
      border-radius: 10px;
      transition: color 0.2s, background 0.2s;
    }

    .song-list li.playing {
      color: #ff5c8a;
      background: rgba(255, 92, 138, 0.1);
    }

    .song-list li::before {
      content: "🎵  ";
    }

    .song-list li.playing::before {
      content: "▶️  ";
    }

    .confetti {
      position: fixed;
      top: -20px;
      width: 10px;
      height: 10px;
      border-radius: 2px;
      animation: fall linear forwards;
      pointer-events: none;
      z-index: 999;
    }

    @keyframes fall {
      0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    #start-overlay {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #fff9c4 0%, #ffe0f0 50%, #d0f0ff 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.2rem;
      z-index: 9999;
      cursor: pointer;
    }

    #start-overlay h2 {
      font-family: 'Fredoka One', cursive;
      font-size: 2.2rem;
      color: #ff5c8a;
      text-align: center;
      text-shadow: 3px 3px 0px #ffd6e8;
    }

    #start-overlay p {
      font-size: 1rem;
      color: #b06aaa;
      font-weight: 700;
    }

    #start-btn {
      background: #ff5c8a;
      color: #fff;
      border: none;
      border-radius: 50px;
      font-family: 'Nunito', sans-serif;
      font-size: 1.3rem;
      font-weight: 800;
      padding: 0.9rem 2.5rem;
      cursor: pointer;
      box-shadow: 0 6px 0 rgba(0,0,0,0.15);
      transition: transform 0.15s, box-shadow 0.15s;
    }

    #start-btn:active {
      transform: translateY(3px);
      box-shadow: 0 3px 0 rgba(0,0,0,0.15);
    }
  </style>
</head>
<body>

  <div id="start-overlay">
    <h2>Papa Playlist 🕺</h2>
    <p>Tik om te beginnen!</p>
    <button id="start-btn">▶ Start de muziek!</button>
  </div>

  <div class="stars">🌟 🎉 🌟 🎉 🌟</div>

  <h1>Dans op de Papa Playlist! 🕺</h1>

  <div class="gif-container">
    <img id="dancer-gif" src="" alt="Papa dancing" style="min-height:200px;" />
  </div>

  <div class="player">
    <div id="now-playing">Laden... 🎶</div>
    <div class="controls">
      <button id="btn-next" onclick="nextSong()">⏭ Volgende papa nummer</button>
      <button id="btn-gif" onclick="nextGif()">🧥 Nieuwe jas</button>
    </div>
    <audio id="audio-player" controls onended="nextSong()"></audio>
  </div>

  <div class="song-list">
    <h2>🎵 De Playlist</h2>
    <ul id="playlist"></ul>
  </div>

  <script>
    // ─────────────────────────────────────────
    // CONFIGURE YOUR GITHUB REPO HERE
    // ─────────────────────────────────────────
    const GITHUB_OWNER = 'papaplaylist';  // e.g. 'johnsmith'
    const GITHUB_REPO  = 'papaplaylist.github.io';          // your repo name
    // ─────────────────────────────────────────
    // Put .gif files in the  /gifs/  folder
    // Put .mp3 files in the  /songs/ folder
    // ─────────────────────────────────────────

    let songs = [];
    let gifs  = [];
    let currentIndex = -1;

    const audio      = document.getElementById('audio-player');
    const nowPlaying = document.getElementById('now-playing');
    const playlist   = document.getElementById('playlist');
    const dancerGif  = document.getElementById('dancer-gif');

    async function loadAssets() {
      const apiBase = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents`;
      try {
        const [gifRes, songRes] = await Promise.all([
          fetch(`${apiBase}/gifs`),
          fetch(`${apiBase}/songs`)
        ]);
        if (gifRes.ok) {
          const gifFiles = await gifRes.json();
          gifs = gifFiles
            .filter(f => f.type === 'file' && /\.gif$/i.test(f.name))
            .map(f => f.download_url);
        }
        if (songRes.ok) {
          const songFiles = await songRes.json();
          songs = songFiles
            .filter(f => f.type === 'file' && /\.mp3$/i.test(f.name))
            .map(f => ({ title: f.name.replace(/\.mp3$/i, '').replace(/\s*\(SPOTISAVER\)/gi, '').trim(), src: f.download_url }));
        }
      } catch (e) {
        console.warn('Could not load assets from GitHub API:', e);
      }
      if (gifs.length === 0 || songs.length === 0) {
        nowPlaying.textContent = gifs.length === 0 && songs.length === 0
          ? '⚠️ No GIFs or songs found — add files to /gifs/ and /songs/ folders!'
          : gifs.length === 0
          ? '⚠️ No GIFs found — add .gif files to the /gifs/ folder!'
          : '⚠️ No songs found — add .mp3 files to the /songs/ folder!';
      }
      buildPlaylist();
      showGif();
      if (songs.length > 0) playRandom();
    }

    function buildPlaylist() {
      playlist.innerHTML = '';
      songs.forEach((song, i) => {
        const li = document.createElement('li');
        li.textContent = song.title;
        li.id = `track-${i}`;
        playlist.appendChild(li);
      });
    }

    function setActive(index) {
      document.querySelectorAll('#playlist li').forEach(li => li.classList.remove('playing'));
      const active = document.getElementById(`track-${index}`);
      if (active) active.classList.add('playing');
    }

    let currentGifIndex = 0;
    function showGif() {
      if (gifs.length === 0) return;
      dancerGif.src = gifs[currentGifIndex];
    }

    function nextGif() {
      if (gifs.length === 0) return;
      currentGifIndex = (currentGifIndex + 1) % gifs.length;
      showGif();
    }

    function playSong(index) {
      currentIndex = index;
      const song = songs[index];
      audio.src = song.src;
      audio.play();
      nowPlaying.textContent = '🎶  ' + song.title;
      setActive(index);
      launchConfetti();
    }

    function playRandom() {
      if (songs.length === 0) return;
      const index = Math.floor(Math.random() * songs.length);
      playSong(index);
    }

    function nextSong() {
      if (songs.length === 0) return;
      const index = Math.floor(Math.random() * songs.length);
      playSong(index);
    }

    function launchConfetti() {
      const colors = ['#ff5c8a','#ffcc00','#5bc8ff','#a8e063','#ff9f43','#d4a4ff'];
      for (let i = 0; i < 28; i++) {
        const el = document.createElement('div');
        el.className = 'confetti';
        el.style.left = Math.random() * 100 + 'vw';
        el.style.background = colors[Math.floor(Math.random() * colors.length)];
        el.style.width = (6 + Math.random() * 8) + 'px';
        el.style.height = (6 + Math.random() * 8) + 'px';
        el.style.animationDuration = (1.5 + Math.random() * 2) + 's';
        el.style.animationDelay = (Math.random() * 0.5) + 's';
        document.body.appendChild(el);
        el.addEventListener('animationend', () => el.remove());
      }
    }

    const overlay = document.getElementById('start-overlay');
    overlay.addEventListener('click', () => {
      overlay.style.display = 'none';
      loadAssets();
    });
  </script>

</body>
</html>
